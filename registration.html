<main>



  <section class="register">
    <h2 class="section-title text-center">User Registration</h2>
    <div class="cart__payment-methods card">
     
      <div>
        <i class="fab fa-facebook fa-3x" style="color: #1877F2;"></i>
        <i class="fab fa-twitter fa-3x" style="color: #1DA1F2;"></i>
        <i class="fab fa-google fa-3x" style="color: #DB4437;"></i>
        <i class="fab fa-google-play fa-3x" style="color: #3DDC84;"></i>
      </div>
      <h2>Or </h2></div>
    <div class="card">
      <form action="" class="form">
        <div class="form-control flex-center">
          <label for="name">Name</label>
          <input type="text" id="name" required autocomplete="name" />
        </div>
        <div class="form-control flex-center">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="form-control flex-center">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            required
            autocomplete="password"
          />
        </div>
        <div class="form-control flex-center">
          <label for="about">About Me</label>
          <textarea name="about" id="about"></textarea>
        </div>
        <div class="form-control flex-center form-btn-field">
          <button type="submit" class="btn contact-btn">submit</button>
        </div>
      </form>
    </div>
 
   
  </section>


</main>
