    <main>
      <section class="contact-section">
        <h2 class="section-title text-center">Contact Us</h2>
        <div class="contact-conatiner flex-center">
          <form action="" class="form card">
            <div class="form-control flex-center">
              <label for="name">Name</label>
              <input type="text" id="name" required autocomplete="name" />
            </div>
            <div class="form-control flex-center">
              <label for="email">Email</label>
              <input type="email" id="email" required autocomplete="email" />
            </div>
            <div class="form-control flex-center">
              <label for="message">Message</label>
              <textarea name="message" id="message"></textarea>
            </div>
            <div class="form-control flex-center form-btn-field">
              <button type="submit" class="btn contact-btn">submit</button>
            </div>
          </form>
          <div class="contact-address flex-space-around">
            <address>
              <h4>Address:</h4>
              <p>Borshijura,moulvibazar</p>
              <p>Sylhet,Bangladesh</p>
              <br />

              <span>Call: </span>
              <a href="tel:+123456789">+880-1738980541</a>
            </address>
            <iframe
              class="contact__map"
              src="https://www.google.com/maps/place/Borshijura+Government+Primary+School/@24.4845643,91.78969,17z/data=!3m1!4b1!4m6!3m5!1s0x375175ec85e35be3:0x507c59065f760273!8m2!3d24.4845643!4d91.7922649!16s%2Fg%2F11frdtl_bw?entry=ttu&g_ep=EgoyMDI1MDQwMi4xIKXMDSoJLDEwMjExNDU1SAFQAw%3D%3D"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>
      </section>
    </main>
